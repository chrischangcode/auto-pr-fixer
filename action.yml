name: 'Auto PR Fixer'
description: 'Automatically fix PR CI build failures using GitHub Copilot CLI'
author: 'chrischangcode'

branding:
  icon: 'tool'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token with repo write and Models API access'
    required: true
  config-path:
    description: 'Path to the config file in the repo (loaded from default branch)'
    required: false
    default: '.github/auto-pr-fixer.yml'

runs:
  using: 'composite'
  steps:
    - name: Run auto-pr-fixer
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        CONFIG_PATH: ${{ inputs.config-path }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
      run: bash "${{ github.action_path }}/scripts/main.sh"
